name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  mypy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - run: pip install -r requirements-dev.txt
      - run: mypy --strict calculus

  pyflakes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - run: pip install -r requirements-dev.txt
      - run: pyflakes calculus

  pydocstyle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - run: pip install -r requirements-dev.txt
      - run: pydocstyle calculus

  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - run: pip install -r requirements-dev.txt
      - run: pytest

  whitespace:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: git diff --check 4b825dc642cb6eb9a060e54bf8d69288fbee4904 HEAD
